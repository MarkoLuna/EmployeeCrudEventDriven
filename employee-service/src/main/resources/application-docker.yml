server:
  port: 8080

####### resource server configuration properties
spring:
  security:
    oauth2:
      client:
        provider:
          keycloak:
            client-id: dev-realm
            issuer-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}
      resourceserver:
        jwt:
          issuer-uri: http://localstack.lks.com:8080/realms/dev
          user-name-attribute: preferred_username

spring.security.oauth2.client:
  registration:
    dev-realm:
      provider: keycloak
      client-id: newClient
      client-secret: newClientSecret
      authorization-grant-type: authorization_code
      scope: openid,profile,email
      redirect-uri: http://employee-service:8080/login/oauth2/code/dev-realm
      client-name: "NSA2 Keycloak"
      client-authentication-method: client_secret_basic

services:
  employee-service-consumer:
    base-url: http://employee-service-consumer:8080

kafka:
  producer:
    bootstrap-servers: kafka:9092
    employee-upsert-topic: employee-upsert.v1
    employee-deletion-topic: employee-deletion.v1
