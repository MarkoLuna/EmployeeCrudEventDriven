server {
    listen 80;
    resolver 127.0.0.11 valid=30s;

    location / {
        # ... serve static files or return 404 ...
        root /usr/share/nginx/html;
        index index.html index.htm;
    }

    # keycloak service
    location ~* ^/auth/(.*) {
        proxy_pass http://keycloak-x:8080/$1$is_args$args;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 8080;
        proxy_set_header X-Forwarded-Prefix /auth;
    }

    # Keycloak realms and resources (for direct issuer resolution)
    location /realms/ {
        proxy_pass http://keycloak-x:8080/realms/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 8080;
    }

    location /resources/ {
        proxy_pass http://keycloak-x:8080/resources/;
        proxy_set_header Host $host;
    }

    # employee consumer service
    location ~* ^/consumer/(.*) {
        proxy_pass http://employee-service-consumer:8080/$1$is_args$args;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /consumer;
    }

    # employee service
    location ~* ^/service/(.*) {
        proxy_pass http://employee-service:8080/$1$is_args$args;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /service;
    }

}