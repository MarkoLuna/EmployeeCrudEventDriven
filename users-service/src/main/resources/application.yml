server:
  port: 8084

spring:
  application:
    name: users-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/dev
          user-name-attribute: preferred_username

app:
  keycloak:
    realm: dev

services:
  iam-service:
    base-url: http://localhost:8081

springdoc:
  packagesToScan: com.users
  pathsToMatch: /users/**

logging:
  level:
    root: INFO
    com.users: DEBUG
